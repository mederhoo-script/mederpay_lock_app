name: Build Release APK

# ── Triggers ──────────────────────────────────────────────────────────────────
# • Push to main (automatic release build after every merge)
# • Manual dispatch from the GitHub Actions UI (one-click build on demand)
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-release-apk.yml'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1). Leave blank to use the value in build.gradle.kts.'
        required: false
        default: ''

# ── Required GitHub Secrets ────────────────────────────────────────────────────
# Add these in:  Settings → Secrets and variables → Actions → New repository secret
#
#   ANDROID_DEVICE_API_SECRET   Shared secret that matches web/.env.local
#   ANDROID_API_BASE_URL        e.g. https://mederbuy.vercel.app/api/
#   ANDROID_KEYSTORE_BASE64     Base64 of your .jks / .keystore file
#                                 Encode: base64 -w 0 release.keystore
#   ANDROID_KEYSTORE_PASSWORD   Keystore password
#   ANDROID_KEY_ALIAS           Key alias inside the keystore
#   ANDROID_KEY_PASSWORD        Key entry password

jobs:
  build:
    name: Assemble & Sign Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle cache ───────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/**/*.gradle*', 'app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Decode keystore ────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/android/release.keystore
            echo "Keystore decoded successfully"
          else
            # No keystore provided — generate a temporary self-signed one for this build.
            # NOTE: APKs signed with a generated keystore cannot be distributed via the
            #       Play Store. Add the ANDROID_KEYSTORE_BASE64 secret for production use.
            echo "⚠️  ANDROID_KEYSTORE_BASE64 not set — generating a temporary signing keystore"
            TEMP_PASS=$(openssl rand -hex 20)
            keytool -genkeypair -noprompt \
              -keystore app/android/release.keystore \
              -alias mederbuylock \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass "$TEMP_PASS" \
              -keypass  "$TEMP_PASS" \
              -dname "CN=MederBuyLock, O=MederBuy, C=KG"
            echo "GENERATED_KEYSTORE=true" >> "$GITHUB_ENV"
            echo "TEMP_KEYSTORE_PASS=$TEMP_PASS" >> "$GITHUB_ENV"
          fi

      # ── 5. Write gradle.properties ────────────────────────────────────────────
      - name: Write gradle.properties
        env:
          ANDROID_DEVICE_API_SECRET: ${{ secrets.ANDROID_DEVICE_API_SECRET }}
          ANDROID_API_BASE_URL: ${{ secrets.ANDROID_API_BASE_URL }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Resolve signing credentials (real secrets or generated fallback)
          KS_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-${TEMP_KEYSTORE_PASS}}"
          KEY_ALIAS="${ANDROID_KEY_ALIAS:-mederbuylock}"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-${TEMP_KEYSTORE_PASS}}"

          cat > app/gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          
          ANDROID_DEVICE_API_SECRET=${ANDROID_DEVICE_API_SECRET}
          ANDROID_API_BASE_URL=${ANDROID_API_BASE_URL:-https://mederbuy.vercel.app/api/}
          ANDROID_KEYSTORE_PATH=release.keystore
          ANDROID_KEYSTORE_PASSWORD=${KS_PASSWORD}
          ANDROID_KEY_ALIAS=${KEY_ALIAS}
          ANDROID_KEY_PASSWORD=${KEY_PASSWORD}
          org.gradle.jvmargs=-Xmx4g
          EOF
          echo "gradle.properties written"

      # ── 6. Override versionName if supplied ───────────────────────────────────
      - name: Override versionName
        if: ${{ github.event.inputs.version_name != '' }}
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ github.event.inputs.version_name }}\"/" \
            app/android/build.gradle.kts

      # ── 7. Make gradlew executable ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x app/gradlew

      # ── 8. Build release APK ──────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: app
        run: ./gradlew :android:assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs=-Xmx4g

      # ── 9. Rename APK with version + commit SHA ───────────────────────────────
      - name: Rename APK
        id: rename
        run: |
          # Use sed for portable, whitespace-independent extraction (grep -oP is not available on macOS runners).
          VERSION=$(sed -n 's/.*versionName *= *"\([^"]*\)".*/\1/p' app/android/build.gradle.kts | head -1)
          VERSION="${VERSION:-1.0.0}"
          SHA="${GITHUB_SHA::7}"
          APK_NAME="mederbuylock-v${VERSION}-${SHA}-release.apk"
          # Find whichever .apk Gradle produced and rename it.
          APK_SRC=$(find app/android/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK_SRC" "app/android/build/outputs/apk/release/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      # ── 10. Upload APK as workflow artifact ───────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: app/android/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 11. Remove keystore from workspace ────────────────────────────────────
      - name: Remove keystore
        if: always()
        run: rm -f app/android/release.keystore

      # ── 12. Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Release APK built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK | \`${{ steps.rename.outputs.apk_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA::7}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$GENERATED_KEYSTORE" = "true" ]; then
            echo "| Signing | ⚠️ Temporary keystore (add ANDROID_KEYSTORE_BASE64 secret for production) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Signing | ✅ Production keystore |" >> "$GITHUB_STEP_SUMMARY"
          fi
