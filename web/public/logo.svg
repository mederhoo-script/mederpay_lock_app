<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" />
  <!-- Phone icon -->
  <rect x="65" y="45" width="70" height="110" rx="12" ry="12" fill="white" opacity="0.15"/>
  <rect x="70" y="50" width="60" height="100" rx="9" ry="9" fill="white" opacity="0.9"/>
  <!-- Screen -->
  <rect x="77" y="65" width="46" height="60" rx="4" ry="4" fill="url(#grad)"/>
  <!-- Home button -->
  <circle cx="100" cy="140" r="5" fill="url(#grad)" opacity="0.5"/>
  <!-- Naira sign on screen -->
  <text x="100" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="26" fill="white">₦</text>
</svg>
